name: Build APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  # ──────────────────────────────────────────────
  # Parallel quality checks & debug build
  # ──────────────────────────────────────────────

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties
    - name: Lint
      run: ./gradlew lintRelease 2>&1 | tail -30

    - name: Ktlint
      run: ./gradlew ktlintCheck 2>&1 | tail -30
      continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties
    - name: Unit tests
      run: ./gradlew testDebugUnitTest 2>&1 | tail -30
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/
        retention-days: 7

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties
    - name: JaCoCo coverage report & verification
      run: ./gradlew jacocoTestReport jacocoTestCoverageVerification 2>&1 | tail -40
    - name: Generate coverage badge
      if: github.ref == 'refs/heads/main'
      uses: cicirello/jacoco-badge-generator@v2.11.0
      with:
        jacoco-csv-file: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.csv
        badges-directory: badges
        generate-branches-badge: true
        generate-summary: true
        commit-badge: true
        commit-message: 'chore: update coverage badge'
        on-missing-report: fail
    - name: Upload coverage report (HTML)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-html
        path: app/build/reports/jacoco/jacocoTestReport/html/
        retention-days: 7

    - name: Upload coverage report (XML)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
        retention-days: 30

  build-debug:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties
    - name: Build Debug APK
      run: ./gradlew assembleDebug 2>&1 | tail -20
    - name: Rename Debug APK
      run: |
        VERSION=$(grep versionName app/build.gradle.kts | grep -oP '\d[\d.]*')
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          cp app/build/outputs/apk/debug/app-debug.apk "HealthConnectExport-${VERSION}-debug.apk"
        fi
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: HealthConnectExport-debug
        path: HealthConnectExport-*-debug.apk
        retention-days: 7

  # ──────────────────────────────────────────────
  # Release build (after parallel jobs)
  # ──────────────────────────────────────────────

  build-release:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: [lint, test, build-debug]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

    - name: Bump version (tag push only)
      if: startsWith(github.ref, 'refs/tags/v')
      id: bump
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        echo "Bumping to version: $TAG_VERSION"
        sed -i "s/versionName = \".*\"/versionName = \"$TAG_VERSION\"/" app/build.gradle.kts
        CURRENT_CODE=$(grep 'versionCode =' app/build.gradle.kts | grep -oP '\d+')
        NEW_CODE=$((CURRENT_CODE + 1))
        sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
        echo "VERSION_NAME=$TAG_VERSION" >> $GITHUB_ENV
        echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_ENV

    - name: Commit version bump
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add app/build.gradle.kts
        git commit -m "chore: bump version to ${VERSION_NAME} (${VERSION_CODE})"
        git push origin HEAD:main

    - name: Decode keystore
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > healthconnect-release.jks 2>/dev/null || true

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: ./gradlew assembleRelease 2>&1 | tail -20
      continue-on-error: true

    - name: Rename APKs
      run: |
        VERSION="${VERSION_NAME:-$(grep versionName app/build.gradle.kts | grep -oP '\d[\d.]*')}"
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          cp app/build/outputs/apk/release/app-release.apk "HealthConnectExport-${VERSION}.apk"
        fi
        if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          cp app/build/outputs/apk/release/app-release-unsigned.apk "HealthConnectExport-${VERSION}-unsigned.apk"
        fi

    - name: Upload Release APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: HealthConnectExport-release
        path: HealthConnectExport-*.apk
        retention-days: 30

  # ──────────────────────────────────────────────
  # GitHub Release (tag push only)
  # ──────────────────────────────────────────────

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: HealthConnectExport-release
        path: release-artifacts

    - name: Generate changelog
      run: |
        echo "# HealthConnect Export v${{ env.VERSION }}" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        git log --oneline $(git tag --sort=-version:refname | head -2 | tail -1 || git rev-list --max-parents=0 HEAD)..HEAD --no-merges >> CHANGELOG.md 2>/dev/null || echo "- Initial release" >> CHANGELOG.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: v${{ env.VERSION }}
        body_path: CHANGELOG.md
        files: |
          release-artifacts/HealthConnectExport-*.apk
        fail_on_unmatched_files: false
