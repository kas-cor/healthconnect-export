name: Build APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Diagnose
      run: |
        which gradle
        gradle --version
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls -la $ANDROID_HOME/
        echo "---"
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        cat local.properties

    - name: Test Gradle
      run: gradle tasks --all 2>&1 | head -50
      continue-on-error: true

    - name: Build Debug
      run: gradle assembleDebug --stacktrace 2>&1 | tee build.log
      continue-on-error: true

    - name: Show Results
      if: always()
      run: |
        echo "=== LAST 30 LINES ==="
        tail -n 30 build.log 2>/dev/null || echo "No log"
        echo "=== APK SEARCH ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK"

    - name: Upload Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 7
