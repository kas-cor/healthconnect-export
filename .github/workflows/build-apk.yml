name: Build APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew --version

    - name: Diagnose Environment
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        echo "JAVA_HOME=$JAVA_HOME"
        echo "---"
        ls -la $ANDROID_HOME/
        echo "---"
        find $ANDROID_HOME -name "sdkmanager" 2>/dev/null | head -5
        echo "---"
        cat local.properties 2>/dev/null || echo "No local.properties"

    - name: Accept SDK Licenses
      run: |
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/cmdline-tools/bin
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

    - name: Create local.properties
      run: |
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        cat local.properties

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log
      continue-on-error: true

    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 7

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Find any APKs
      if: always()
      run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
