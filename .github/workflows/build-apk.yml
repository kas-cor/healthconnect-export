name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: Diagnose
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        echo "JAVA_HOME=$JAVA_HOME"
        which gradle
        gradle --version
        ls -la

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Debug APK
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT || env.ANDROID_HOME }}
      run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log || true

    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: build.log
        retention-days: 7

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK (unsigned)
      if: always()
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT || env.ANDROID_HOME }}
      run: ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-release.log || true

    - name: Upload Release Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-release-logs
        path: build-release.log
        retention-days: 7

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-apk-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
