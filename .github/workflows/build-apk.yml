name: Build APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Create local.properties
      run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

    - name: Gradle Environment
      run: gradle buildEnvironment 2>&1 | head -30
      continue-on-error: true

    - name: List Tasks
      run: gradle tasks --group build 2>&1
      continue-on-error: true

    - name: Build Debug
      run: gradle assembleDebug --stacktrace 2>&1 | tee build.log
      continue-on-error: true

    - name: Show Results
      if: always()
      run: |
        echo "=== LAST 40 LINES ==="
        tail -n 40 build.log 2>/dev/null || echo "No log"
        echo "=== APK SEARCH ==="
        find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK"
        echo "=== BUILD DIR ==="
        ls -la app/build/ 2>/dev/null || echo "No build dir"

    - name: Upload Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 7
